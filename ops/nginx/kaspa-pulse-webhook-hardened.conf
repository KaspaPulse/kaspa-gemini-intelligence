# Kaspa Pulse webhook reverse proxy reference.
# Keep bot WEBHOOK_BIND=127.0.0.1 and do not expose the Rust port publicly.

limit_req_zone $binary_remote_addr zone=telegram_webhook:10m rate=10r/s;

server {
    listen 443 ssl http2;
    server_name api.example.com;

    # ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    client_max_body_size 2m;

    location / {
        limit_req zone=telegram_webhook burst=20 nodelay;

        proxy_pass http://127.0.0.1:8443;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Telegram secret header is validated by the Telegram webhook setup/bot stack.
        # Do not log request bodies that may contain user messages.
    }

    location /healthz {
        return 403;
    }

    location /readyz {
        return 403;
    }

    location /metrics {
        return 403;
    }
}
