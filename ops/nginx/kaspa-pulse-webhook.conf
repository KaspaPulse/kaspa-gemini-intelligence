# Kaspa Pulse reverse proxy reference config.
# This file contains no secrets.
#
# Expected app listener:
#   WEBHOOK_BIND=127.0.0.1
#   WEBHOOK_PORT=8443
#   HEALTH_BIND=127.0.0.1
#   HEALTH_PORT=18080
#
# Put this behind a valid TLS certificate.
#
# Optional Telegram source IP allowlist:
# Telegram publishes webhook source ranges separately. Keep this block updated
# from Telegram's official documentation if you enable allow/deny rules.

server {
    listen 443 ssl http2;
    server_name api.kaspadns.net;

    # ssl_certificate     /etc/letsencrypt/live/api.kaspadns.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.kaspadns.net/privkey.pem;

    client_max_body_size 1m;

    location = /webhook {
        proxy_pass http://127.0.0.1:8443/webhook;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:18080/healthz;
        access_log off;
    }

    location = /readyz {
        proxy_pass http://127.0.0.1:18080/readyz;
        access_log off;
    }
}
