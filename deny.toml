[licenses]
allow = [
    "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "Unlicense",
    "BSD-3-Clause", "BSD-2-Clause", "0BSD", "ISC", "CC0-1.0",
    "OpenSSL", "Unicode-DFS-2016", "Unicode-3.0", "Zlib", "MPL-2.0",
    "LGPL-3.0-only", "CDLA-Permissive-2.0"
]

[bans]
multiple-versions = "allow"

[advisories]
# Ignore ONLY the specific unmaintainable Kaspa dependencies we reviewed
# Plus the compile-time sqlx-mysql macro dependency (RUSTSEC-2023-0071) 
# and unmaintained rustls-pemfile warning (RUSTSEC-2025-0134).
ignore = [
    "RUSTSEC-2023-0071", # SQLx compile-time macro vulnerability
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained warning
    "RUSTSEC-2023-0044", # RSA timing side-channel (Buried in Kaspa crypto)
    "RUSTSEC-2023-0072"  # Ed25519 fallback warning (Buried in Kaspa crypto)
]

[sources]
unknown-registry = "warn"
allow-git = [
    "https://github.com/kaspanet/rusty-kaspa",
    "https://github.com/RustSec/advisory-db"
]
