[licenses]
allow = [
    "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "Unlicense",
    "BSD-3-Clause", "BSD-2-Clause", "0BSD", "ISC", "CC0-1.0",
    "OpenSSL", "Unicode-DFS-2016", "Unicode-3.0", "Zlib", "MPL-2.0",
    "LGPL-3.0-only", "CDLA-Permissive-2.0"
]

[bans]
multiple-versions = "allow"

[advisories]
# Ignore verified upstream vulnerabilities that have NO fixed version yet
ignore = [
    "RUSTSEC-2023-0071", # Marvin Attack (rsa crate via sqlx-mysql)
    "RUSTSEC-2025-0052", # async-std discontinued (via kaspa-wrpc-client)
    "RUSTSEC-2025-0134", # rustls-pemfile warning
    "RUSTSEC-2023-0044", # RSA timing (Kaspa crypto)
    "RUSTSEC-2023-0072", # Ed25519 warning (Kaspa crypto)
    "RUSTSEC-2021-0145"  # atty unaligned read warning (via hexplay -> workflow-log)
]

[sources]
unknown-registry = "warn"
allow-git = [
    "https://github.com/kaspanet/rusty-kaspa",
    "https://github.com/RustSec/advisory-db",
    "https://github.com/murar8/serde_nested_with" # Added to fix unknown git source warning
]